name: WispMark-macOS
options:
  minimumXcodeGenVersion: 2.44.0
  deploymentTarget:
    macOS: "13.0"
settings:
  base:
    PRODUCT_NAME: WispMark
    PRODUCT_BUNDLE_IDENTIFIER: com.andybarenberg.WispMark
    CODE_SIGN_STYLE: Automatic
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: 1.0.0
    CURRENT_PROJECT_VERSION: 1
packages:
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk
    from: 11.7.0
targets:
  WispMark:
    type: application
    platform: macOS
    deploymentTarget: "13.0"
    entitlements:
      path: WispMark.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.files.user-selected.read-only: true
    sources:
      - path: main.swift
      - path: FirestoreSync.swift
      - path: StoreAppIcon.icns
        buildPhase: resources
    dependencies:
      - package: Firebase
        product: FirebaseCore
      - package: Firebase
        product: FirebaseFirestore
    settings:
      base:
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Info.plist
        CODE_SIGN_ENTITLEMENTS: WispMark.entitlements
        ENABLE_HARDENED_RUNTIME: YES
schemes:
  WispMark:
    build:
      targets:
        WispMark: all
    run:
      config: Debug
    archive:
      config: Release
