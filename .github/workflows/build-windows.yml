name: Build Windows Portable

on:
  push:
    branches: [main]
    paths:
      - 'FloatMD-Windows/**'
      - '.github/workflows/build-windows.yml'
  pull_request:
    branches: [main]
    paths:
      - 'FloatMD-Windows/**'
  workflow_dispatch: # Allow manual trigger

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: FloatMD-Windows/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: FloatMD-Windows/src-tauri

      - name: Install frontend dependencies
        working-directory: FloatMD-Windows
        run: npm install

      - name: Build Tauri app
        working-directory: FloatMD-Windows
        run: npm run tauri build

      - name: Create portable package
        shell: pwsh
        run: |
          # Create portable folder structure
          New-Item -ItemType Directory -Force -Path "FloatMD-Portable"

          # Copy the exe
          Copy-Item "FloatMD-Windows/src-tauri/target/release/FloatMD.exe" "FloatMD-Portable/"

          # Create data folder and portable marker
          New-Item -ItemType Directory -Force -Path "FloatMD-Portable/data"
          New-Item -ItemType File -Force -Path "FloatMD-Portable/.portable"

          # Create a simple README
          @"
          FloatMD - Portable Windows Version
          ===================================

          Just run FloatMD.exe - no installation required!

          Your notes are stored in the 'data' folder next to the exe.
          You can copy this entire folder to a USB drive.

          Hotkeys:
          - Ctrl+Shift+M: Toggle window
          - Ctrl+Alt+I: Inject text into active app
          - Ctrl+N: New note
          "@ | Out-File -FilePath "FloatMD-Portable/README.txt" -Encoding UTF8

      - name: Upload portable artifact
        uses: actions/upload-artifact@v4
        with:
          name: FloatMD-Windows-Portable
          path: FloatMD-Portable/
          retention-days: 30

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: FloatMD-Windows-Installer
          path: FloatMD-Windows/src-tauri/target/release/bundle/nsis/*.exe
          retention-days: 30
